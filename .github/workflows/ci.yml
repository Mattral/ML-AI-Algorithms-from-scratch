# .github/workflows/ci.yml
#
# Runs on every push and pull request to main/dev branches.
# Jobs:
#   lint     — ruff + black --check
#   test     — pytest matrix across Python 3.10 / 3.11 / 3.12 with coverage
#   build    — verify the sdist + wheel build cleanly (no publish)
#
# On a version tag (v*.*.*), an additional `release` job builds and
# publishes to PyPI via Trusted Publishing (no stored API key needed).

name: CI

on:
  push:
    branches: [main, dev]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main, dev]

concurrency:
  group:  ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install "ruff>=0.4" "black>=24"

      - name: ruff check
        run: ruff check src/ tests/

      - name: black --check
        run: black --check src/ tests/


  # ── 2. Test matrix ──────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=src/mlscratch \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --tb=short \
            -m "not slow"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false    # don't fail CI on Codecov outages
          token: ${{ secrets.CODECOV_TOKEN }}


  # ── 3. Build check ──────────────────────────────────────────────────────────
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Verify with twine
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/


  # ── 4. Publish to PyPI  (tag pushes only) ───────────────────────────────────
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    # PyPI Trusted Publishing — no API token stored as a secret.
    # Configure at: https://pypi.org/manage/account/publishing/
    permissions:
      id-token: write

    environment:
      name: pypi
      url:  https://pypi.org/p/mlscratch

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
